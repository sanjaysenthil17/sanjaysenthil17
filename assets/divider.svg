<svg width="800" height="4" viewBox="0 0 800 4" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="signal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0" />
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="1" />
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0" />
    </linearGradient>
  </defs>
  <!-- Background subtle line -->
  <rect x="0" y="1" width="800" height="1" fill="#30363d" />
  <!-- Animated signal wave (runs once on load) -->
  <rect x="-800" y="1" width="800" height="1" fill="url(#signal)">
    <animate attributeName="x" values="-800; 800" dur="2.5s" repeatCount="1" fill="freeze" />
    <animate attributeName="opacity" values="0; 1; 0" dur="2.5s" repeatCount="1" fill="freeze" />
  </rect>
</svg>
