name: Update Latest Commit Ticker

on:
  schedule:
    - cron: '0 */2 * * *' # Runs automatically every 2 hours
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Update README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: sanjaysenthil17
        run: python .github/scripts/update_commit.py
        
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -am "chore: update latest commit ticker" || exit 0
          git push
